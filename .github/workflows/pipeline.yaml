name: Build and Test

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      odd_ref:
        description: OpenDataDetector ref
        required: false
        default: main
      pandora_ref:
        description: k4GaudiPandora ref
        required: false
        default: odd_edits
      run_high_stat_resolution:
        description: Run manual 1000-event simulation and digitisation resolution validation
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR_NAME: build-ci
  INSTALL_DIR_NAME: install-ci
  ODD_DIR: ${{ github.workspace }}/OpenDataDetector
  K4GAUDIPANDORA_DIR: ${{ github.workspace }}/k4GaudiPandora
  ODD_URL: ${{ vars.ODD_URL || 'https://gitlab.cern.ch/acts/OpenDataDetector.git' }}
  K4GAUDIPANDORA_URL: ${{ vars.K4GAUDIPANDORA_URL || 'https://github.com/zaborowska/k4GaudiPandora.git' }}
  ODD_REF: ${{ inputs.odd_ref || vars.ODD_REF || 'main' }}
  K4GAUDIPANDORA_REF: ${{ inputs.pandora_ref || vars.K4GAUDIPANDORA_REF || 'odd_edits' }}
  SIM_FILE: gamma_10GeV_eta0_100ev_sim_edm4hep.root
  DIGI_FILE: gamma_10GeV_eta0_100ev_digi_edm4hep.root
  RECO_FILE: gamma_10GeV_eta0_100ev_reco_edm4hep.root
  HIGHSTAT_SIM_FILE: gamma_10GeV_eta0_1000ev_sim_edm4hep.root
  HIGHSTAT_DIGI_FILE: gamma_10GeV_eta0_1000ev_digi_edm4hep.root

jobs:
  simulation:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Build OpenDataDetector
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export ODD_DIR="/Package/OpenDataDetector"
            source "${KEY4HEP_SETUP}"
            cmake -S "${ODD_DIR}" -B "${ODD_DIR}/${BUILD_DIR_NAME}" -GNinja -DCMAKE_INSTALL_PREFIX="${ODD_DIR}/install"
            cmake --build "${ODD_DIR}/${BUILD_DIR_NAME}" -j4
            cmake --install "${ODD_DIR}/${BUILD_DIR_NAME}"
          '

      - name: Run simulation
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export OpenDataDetector="/Package/OpenDataDetector"
            export SIM_FILE="${{ env.SIM_FILE }}"
            source "${KEY4HEP_SETUP}"
            source "${OpenDataDetector}/install/bin/this_odd.sh"
            ddsim \
              --steeringFile k4ODD/options/ODDsimulation.py \
              --enableGun \
              --gun.distribution uniform \
              --gun.etaMin 0 \
              --gun.etaMax 0 \
              --gun.energy "10*GeV" \
              --gun.particle gamma \
              --numberOfEvents 100 \
              --outputFile "${SIM_FILE}" \
              --random.seed 123
            test -f "${SIM_FILE}"
          '

      - uses: actions/upload-artifact@v4
        with:
          name: sim-output-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: ${{ github.workspace }}/${{ env.SIM_FILE }}
          retention-days: 7
          overwrite: true
          if-no-files-found: error

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci

  simulation-validation:
    needs: simulation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: sim-output-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: ${{ github.workspace }}

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Validate simulation
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export OpenDataDetector="/Package/OpenDataDetector"
            export SIM_FILE="${{ env.SIM_FILE }}"
            source "${KEY4HEP_SETUP}"
            python ci/analyse_single_shower_root.py -i "${SIM_FILE}" -o simVal_results.root
          '

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sim-validation-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: |
            ${{ github.workspace }}/*simVal_results.root
            ${{ github.workspace }}/preview_energyFit_gamma_*.pdf
          retention-days: 7
          overwrite: true
          if-no-files-found: ignore

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci

  simulation-regression:
    needs: simulation-validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: sim-validation-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: ${{ github.workspace }}

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Run simulation regression check
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            source "${KEY4HEP_SETUP}"
            if [ "${{ matrix.os }}" = "alma9" ]; then
              ref="ci/reference/release-alma9/simVal_results.root"
            else
              ref="ci/reference/nightly-ubuntu24/simVal_results.root"
            fi
            python ci/check_validation_results.py -i simVal_results.root -p simulation --reference "${ref}"
          '

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci

  digitisation:
    needs: simulation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: sim-output-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: ${{ github.workspace }}

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - name: Clone k4GaudiPandora
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            pandora_url="${K4GAUDIPANDORA_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            pandora_url="$K4GAUDIPANDORA_URL"
          fi
          git clone --depth 1 --branch "$K4GAUDIPANDORA_REF" "$pandora_url" "$K4GAUDIPANDORA_DIR"

      - name: Show external refs
        run: |
          echo "OpenDataDetector:"
          git -C "$ODD_DIR" rev-parse HEAD
          git -C "$ODD_DIR" log -1 --oneline
          echo "k4GaudiPandora:"
          git -C "$K4GAUDIPANDORA_DIR" rev-parse HEAD
          git -C "$K4GAUDIPANDORA_DIR" log -1 --oneline

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Rebuild local stack
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export BUILD_DIR_NAME="${{ env.BUILD_DIR_NAME }}"
            export INSTALL_DIR_NAME="${{ env.INSTALL_DIR_NAME }}"
            export ODD_DIR="/Package/OpenDataDetector"
            export K4GAUDIPANDORA_DIR="/Package/k4GaudiPandora"
            bash ./ci/rebuild_local_stack.sh
          '

      - name: Run digitisation
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export ODD_DIR="/Package/OpenDataDetector"
            export K4GAUDIPANDORA_DIR="/Package/k4GaudiPandora"
            export SIM_FILE="${{ env.SIM_FILE }}"
            export DIGI_FILE="${{ env.DIGI_FILE }}"
            bash -lc "source ./setup.sh && k4run k4ODD/options/ODDdigitisation.py --inputFile \"${SIM_FILE}\" --outputFile \"${DIGI_FILE}\""
            test -f "${DIGI_FILE}"
          '

      - uses: actions/upload-artifact@v4
        with:
          name: digi-output-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: |
            ${{ github.workspace }}/${{ env.DIGI_FILE }}
            ${{ github.workspace }}/ddcalodigi_hist.root
          retention-days: 7
          overwrite: true
          if-no-files-found: error

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci

  digitisation-validation:
    needs: digitisation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: digi-output-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: ${{ github.workspace }}

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Validate digitisation
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export DIGI_FILE="${{ env.DIGI_FILE }}"
            source "${KEY4HEP_SETUP}"
            python -u ci/analyse_single_shower_podio.py -i "${DIGI_FILE}" --digi -o digiVal_results.root
          '

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: digi-validation-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: |
            ${{ github.workspace }}/*digiVal_results.root
            ${{ github.workspace }}/preview_energyFit_gamma_*.pdf
          retention-days: 7
          overwrite: true
          if-no-files-found: ignore

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci

  digitisation-regression:
    needs: digitisation-validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: digi-validation-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: ${{ github.workspace }}

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Run digitisation regression check
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            source "${KEY4HEP_SETUP}"
            if [ "${{ matrix.os }}" = "alma9" ]; then
              ref="ci/reference/release-alma9/digiVal_results.root"
            else
              ref="ci/reference/nightly-ubuntu24/digiVal_results.root"
            fi
            python ci/check_validation_results.py -i digiVal_results.root -p digitisation --reference "${ref}"
          '

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci

  pandora:
    needs:
      - simulation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: sim-output-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: ${{ github.workspace }}

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - name: Clone k4GaudiPandora
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            pandora_url="${K4GAUDIPANDORA_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            pandora_url="$K4GAUDIPANDORA_URL"
          fi
          git clone --depth 1 --branch "$K4GAUDIPANDORA_REF" "$pandora_url" "$K4GAUDIPANDORA_DIR"

      - name: Show external refs
        run: |
          echo "OpenDataDetector:"
          git -C "$ODD_DIR" rev-parse HEAD
          git -C "$ODD_DIR" log -1 --oneline
          echo "k4GaudiPandora:"
          git -C "$K4GAUDIPANDORA_DIR" rev-parse HEAD
          git -C "$K4GAUDIPANDORA_DIR" log -1 --oneline

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Rebuild local stack
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export BUILD_DIR_NAME="${{ env.BUILD_DIR_NAME }}"
            export INSTALL_DIR_NAME="${{ env.INSTALL_DIR_NAME }}"
            export ODD_DIR="/Package/OpenDataDetector"
            export K4GAUDIPANDORA_DIR="/Package/k4GaudiPandora"
            bash ./ci/rebuild_local_stack.sh
          '

      - name: Run Pandora reconstruction
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export ODD_DIR="/Package/OpenDataDetector"
            export K4GAUDIPANDORA_DIR="/Package/k4GaudiPandora"
            export SIM_FILE="${{ env.SIM_FILE }}"
            export RECO_FILE="${{ env.RECO_FILE }}"
            bash -lc "source ./setup.sh && k4run k4ODD/options/ODDreconstruction.py --inputFile \"${SIM_FILE}\" --outputFile \"${RECO_FILE}\" && test -f \"${RECO_FILE}\" && podio-dump \"${RECO_FILE}\" | grep -E \"GaudiPandoraClusters|GaudiPandoraPFOs|GaudiPandoraStartVertices\""
          '

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pandora-output-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: |
            ${{ github.workspace }}/${{ env.RECO_FILE }}
            ${{ github.workspace }}/ddcalodigi_hist.root
          retention-days: 7
          overwrite: true
          if-no-files-found: ignore

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci

  pandora-validation:
    needs: pandora
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: pandora-output-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: ${{ github.workspace }}

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Validate Pandora PFOs
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export RECO_FILE="${{ env.RECO_FILE }}"
            source "${KEY4HEP_SETUP}"
            python -u ci/analyse_pfo_performance.py -i "${RECO_FILE}" -o pandoraVal_results.root
          '

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pandora-validation-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: |
            ${{ github.workspace }}/pandoraVal_results.root
            ${{ github.workspace }}/preview_pfoEnergyFit_*.pdf
          retention-days: 7
          overwrite: true
          if-no-files-found: ignore

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci

  pandora-regression:
    needs: pandora-validation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: pandora-validation-${{ matrix.os }}-${{ contains(matrix.stack, 'nightlies') && 'nightly' || 'release' }}
          path: ${{ github.workspace }}

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Run Pandora regression check
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            source "${KEY4HEP_SETUP}"
            python ci/check_validation_results.py -i pandoraVal_results.root -p pandora
          '

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci

  high-stat-resolution-validation:
    if: github.event_name == 'workflow_dispatch' && inputs.run_high_stat_resolution
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: /cvmfs/sw.hsf.org/key4hep/setup.sh
            os: alma9
          - stack: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh
            os: ubuntu24
    steps:
      - uses: actions/checkout@v6

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - name: Clone k4GaudiPandora
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            pandora_url="${K4GAUDIPANDORA_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            pandora_url="$K4GAUDIPANDORA_URL"
          fi
          git clone --depth 1 --branch "$K4GAUDIPANDORA_REF" "$pandora_url" "$K4GAUDIPANDORA_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Start container
        run: |
          docker run --name k4odd-ci \
                     --privileged \
                     -v "${GITHUB_WORKSPACE}:/Package" \
                     -d "ghcr.io/key4hep/key4hep-images/${{ matrix.os }}-cvmfs" \
                     tail -f /dev/null

      - name: Mount CVMFS
        run: |
          docker exec k4odd-ci /bin/bash -c '/mount.sh'

      - name: Rebuild local stack
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export BUILD_DIR_NAME="${{ env.BUILD_DIR_NAME }}"
            export INSTALL_DIR_NAME="${{ env.INSTALL_DIR_NAME }}"
            export ODD_DIR="/Package/OpenDataDetector"
            export K4GAUDIPANDORA_DIR="/Package/k4GaudiPandora"
            bash ./ci/rebuild_local_stack.sh
          '

      - name: Run high-stat simulation and digitisation
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export ODD_DIR="/Package/OpenDataDetector"
            export K4GAUDIPANDORA_DIR="/Package/k4GaudiPandora"
            export HIGHSTAT_SIM_FILE="${{ env.HIGHSTAT_SIM_FILE }}"
            export HIGHSTAT_DIGI_FILE="${{ env.HIGHSTAT_DIGI_FILE }}"
            bash -lc "source ./setup.sh && ddsim --steeringFile k4ODD/options/ODDsimulation.py --enableGun --gun.distribution uniform --gun.etaMin 0 --gun.etaMax 0 --gun.energy \"10*GeV\" --gun.particle gamma --numberOfEvents 1000 --outputFile \"${HIGHSTAT_SIM_FILE}\" --random.seed 123"
            bash -lc "source ./setup.sh && k4run k4ODD/options/ODDdigitisation.py --inputFile \"${HIGHSTAT_SIM_FILE}\" --outputFile \"${HIGHSTAT_DIGI_FILE}\""
          '

      - name: Validate high-stat simulation and digitisation
        run: |
          docker exec k4odd-ci /bin/bash -lc '
            cd /Package
            export KEY4HEP_SETUP="${{ matrix.stack }}"
            export HIGHSTAT_SIM_FILE="${{ env.HIGHSTAT_SIM_FILE }}"
            export HIGHSTAT_DIGI_FILE="${{ env.HIGHSTAT_DIGI_FILE }}"
            source "${KEY4HEP_SETUP}"
            python ci/analyse_single_shower_root.py -i "${HIGHSTAT_SIM_FILE}" -o simVal_highstat_results.root
            python -u ci/analyse_single_shower_podio.py -i "${HIGHSTAT_DIGI_FILE}" --digi -o digiVal_highstat_results.root
            python ci/check_validation_results.py -i simVal_highstat_results.root -p simulation_highstat
            python ci/check_validation_results.py -i digiVal_highstat_results.root -p digitisation_highstat
          '

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: high-stat-validation-${{ matrix.os }}-release
          path: |
            ${{ github.workspace }}/simVal_highstat_results.root
            ${{ github.workspace }}/digiVal_highstat_results.root
            ${{ github.workspace }}/preview_energyFit_gamma_10GeV_eta0_1000ev_*.pdf
          retention-days: 7
          overwrite: true
          if-no-files-found: ignore

      - name: Stop container
        if: always()
        run: |
          docker rm -f k4odd-ci
