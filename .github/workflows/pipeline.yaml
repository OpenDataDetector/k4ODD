name: Pipeline

on:
  workflow_dispatch:
    inputs:
      odd_ref:
        description: OpenDataDetector ref
        required: false
        default: main
      pandora_ref:
        description: k4GaudiPandora ref
        required: false
        default: odd_edits
  pull_request:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_DIR_NAME: build-ci
  INSTALL_DIR_NAME: install-ci
  ODD_DIR: ${{ github.workspace }}/OpenDataDetector
  K4GAUDIPANDORA_DIR: ${{ github.workspace }}/k4GaudiPandora
  ODD_URL: ${{ vars.ODD_URL || 'https://gitlab.cern.ch/acts/OpenDataDetector.git' }}
  K4GAUDIPANDORA_URL: ${{ vars.K4GAUDIPANDORA_URL || 'https://github.com/zaborowska/k4GaudiPandora.git' }}
  ODD_REF: ${{ inputs.odd_ref || vars.ODD_REF || 'main' }}
  K4GAUDIPANDORA_REF: ${{ inputs.pandora_ref || vars.K4GAUDIPANDORA_REF || 'odd_edits' }}
  SIM_FILE: gamma_10GeV_eta0_100ev_sim_edm4hep.root
  DIGI_FILE: gamma_10GeV_eta0_100ev_digi_edm4hep.root
  RECO_FILE: gamma_10GeV_eta0_100ev_reco_edm4hep.root

jobs:
  simulation:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: cvmfs-contrib/github-action-cvmfs@v3

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Build OpenDataDetector
        run: |
          source /cvmfs/sw.hsf.org/key4hep/setup.sh
          cmake -S "$ODD_DIR" -B "$ODD_DIR/$BUILD_DIR_NAME" -GNinja -DCMAKE_INSTALL_PREFIX="$ODD_DIR/install"
          cmake --build "$ODD_DIR/$BUILD_DIR_NAME" -j4
          cmake --install "$ODD_DIR/$BUILD_DIR_NAME"

      - name: Run simulation
        run: |
          source /cvmfs/sw.hsf.org/key4hep/setup.sh
          export OpenDataDetector="$ODD_DIR"
          source "$ODD_DIR/install/bin/this_odd.sh"
          ddsim \
            --steeringFile k4ODD/options/ODDsimulation.py \
            --enableGun \
            --gun.distribution uniform \
            --gun.etaMin 0 \
            --gun.etaMax 0 \
            --gun.energy "10*GeV" \
            --gun.particle gamma \
            --numberOfEvents 100 \
            --outputFile "${SIM_FILE}" \
            --random.seed 123
          test -f "${SIM_FILE}"

      - uses: actions/upload-artifact@v4
        with:
          name: sim-output
          path: ${{ github.workspace }}/${{ env.SIM_FILE }}
          retention-days: 7
          overwrite: true
          if-no-files-found: error

  digitisation:
    needs: simulation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: cvmfs-contrib/github-action-cvmfs@v3

      - uses: actions/download-artifact@v4
        with:
          name: sim-output
          path: ${{ github.workspace }}

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Clone k4GaudiPandora
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            pandora_url="${K4GAUDIPANDORA_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            pandora_url="$K4GAUDIPANDORA_URL"
          fi
          git clone --depth 1 --branch "$K4GAUDIPANDORA_REF" "$pandora_url" "$K4GAUDIPANDORA_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Rebuild local stack
        run: |
          bash ./ci/rebuild_local_stack.sh

      - name: Run digitisation
        run: |
          source ./setup.sh
          k4run k4ODD/options/ODDdigitisation.py \
            --inputFile "${SIM_FILE}" \
            --outputFile "${DIGI_FILE}"
          test -f "${DIGI_FILE}"

      - uses: actions/upload-artifact@v4
        with:
          name: digi-output
          path: |
            ${{ github.workspace }}/${{ env.DIGI_FILE }}
            ${{ github.workspace }}/ddcalodigi_hist.root
          retention-days: 7
          overwrite: true
          if-no-files-found: error

  pandora:
    needs: digitisation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: cvmfs-contrib/github-action-cvmfs@v3

      - uses: actions/download-artifact@v4
        with:
          name: sim-output
          path: ${{ github.workspace }}

      - uses: actions/download-artifact@v4
        with:
          name: digi-output
          path: ${{ github.workspace }}

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - name: Clone k4GaudiPandora
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            pandora_url="${K4GAUDIPANDORA_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            pandora_url="$K4GAUDIPANDORA_URL"
          fi
          git clone --depth 1 --branch "$K4GAUDIPANDORA_REF" "$pandora_url" "$K4GAUDIPANDORA_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Rebuild local stack
        run: |
          bash ./ci/rebuild_local_stack.sh

      - name: Run Pandora reconstruction
        run: |
          source ./setup.sh
          python "$(which k4run)" \
            k4ODD/options/ODDreconstruction.py \
            --inputFile "${SIM_FILE}" \
            --outputFile "${RECO_FILE}"
          test -f "${RECO_FILE}"
          podio-dump "${RECO_FILE}" | rg "GaudiPandoraClusters|GaudiPandoraPFOs|GaudiPandoraStartVertices"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pandora-output
          path: |
            ${{ github.workspace }}/${{ env.RECO_FILE }}
            ${{ github.workspace }}/ddcalodigi_hist.root
          retention-days: 7
          overwrite: true
          if-no-files-found: ignore

  simulation-validation:
    needs: simulation
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: cvmfs-contrib/github-action-cvmfs@v3

      - uses: actions/download-artifact@v4
        with:
          name: sim-output
          path: ${{ github.workspace }}

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Validate simulation
        run: |
          source /cvmfs/sw.hsf.org/key4hep/setup.sh
          export OpenDataDetector="$ODD_DIR"
          python "$OpenDataDetector/ci/analyse_single_shower.py" -i "${SIM_FILE}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sim-validation-output
          path: |
            ${{ github.workspace }}/*simVal_results.root
            ${{ github.workspace }}/preview_energyFit_gamma_*.pdf
          retention-days: 7
          overwrite: true
          if-no-files-found: ignore

  digitisation-validation:
    needs: pandora
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: cvmfs-contrib/github-action-cvmfs@v3

      - uses: actions/download-artifact@v4
        with:
          name: digi-output
          path: ${{ github.workspace }}

      - name: Clone OpenDataDetector
        env:
          CLONE_TOKEN: ${{ secrets.CI_CLONE_TOKEN }}
        run: |
          if [ -n "${CLONE_TOKEN:-}" ]; then
            odd_url="${ODD_URL/https:\/\//https:\/\/oauth2:${CLONE_TOKEN}@}"
          else
            odd_url="$ODD_URL"
          fi
          git clone --depth 1 --branch "$ODD_REF" "$odd_url" "$ODD_DIR"

      - uses: key4hep/key4hep-actions/cache-external-data@main

      - name: Validate digitisation
        run: |
          source /cvmfs/sw.hsf.org/key4hep/setup.sh
          export OpenDataDetector="$ODD_DIR"
          python "$OpenDataDetector/ci/analyse_single_shower.py" -i "${DIGI_FILE}" --digi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: digi-validation-output
          path: |
            ${{ github.workspace }}/*digiVal_results.root
            ${{ github.workspace }}/preview_energyFit_gamma_*.pdf
          retention-days: 7
          overwrite: true
          if-no-files-found: ignore
